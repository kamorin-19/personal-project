services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules     # 匿名ボリューム: コンテナ内 node_modules をホスト側で上書きさせない
      - /app/.svelte-kit      # 同上: SvelteKit 生成物を保護
    environment:
      - PUBLIC_API_URL=http://localhost:5173/api
      - BACKEND_HOST=backend
      - BACKEND_URL=http://backend:8000
      # Google OAuth2 — .env ファイルで上書きすること
      - PUBLIC_GOOGLE_CLIENT_ID=${PUBLIC_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:5173/auth/callback}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-in-production}
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - AWS_REGION=ap-northeast-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - DYNAMODB_ENDPOINT_URL=http://dynamodb-local:8000
      - ALLOWED_ORIGINS=["http://localhost:5173"]
      # Google OAuth2 — .env ファイルで上書きすること
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:5173/auth/callback}
      - JWT_SECRET_KEY=${JWT_SECRET:-dev-secret-change-me-in-production}
    depends_on:
      - dynamodb-local
    networks:
      - app-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
